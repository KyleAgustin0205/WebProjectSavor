<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log In — Savor & Co.</title>
  <link rel="icon" type="image/png" href="images/favicon-32x32.png" />
  <link rel="stylesheet" href="css/styles.css" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lato:wght@300;400;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">Savor <span>&amp;</span> Co.</div>
      <h2>Welcome Back</h2>
      <p class="subtitle">Log in to your account to continue</p>
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" placeholder="Enter your username" />
      </div>
      <div class="form-group">
        <label for="email">Email Address</label>
        <input type="email" id="email" placeholder="Enter your email" />
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input type="password" id="password" placeholder="Enter your password" />
          <button class="toggle-pass" onclick="togglePassword()" type="button">&#128065;</button>
        </div>
      </div>
      <div class="form-options">
        <label class="remember-me">
          <input type="checkbox" id="rememberMe" />
          <span>Remember Me</span>
        </label>
        <a href="#" class="forgot-link">Forgot Password?</a>
      </div>
      <button class="auth-submit" onclick="handleLogin()">Log In</button>
      <p class="auth-switch">Don't have an account? <a href="signup.html">Sign Up</a></p>
      <a href="index.html" class="back-home">&#8592; Back to Home</a>
    </div>
  </div>
  <script>
    function togglePassword() {
      const input = document.getElementById('password');
      input.type = input.type === 'password' ? 'text' : 'password';
    }
    function handleLogin() {
      const username = document.getElementById('username').value.trim();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value.trim();
      if (!username || !email || !password) {
        alert('Please fill in all fields.');
        return;
      }
      alert('Logged in successfully! Welcome, ' + username + '!');
      window.location.href = 'index.html';
    }
  </script>
</body>
</html>
